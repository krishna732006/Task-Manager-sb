<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

  <h1 class="text-2xl font-bold mb-4">Task Manager</h1>

  <!-- Form -->
  <div class="mb-4">
    <input id="title" placeholder="Title" class="border p-2 mr-2">
    <input id="desc" placeholder="Description" class="border p-2 mr-2">
    <button onclick="createTask()" class="bg-blue-500 text-white px-4 py-2">
      Add
    </button>
  </div>

  <!-- Task list -->
  <div id="tasks"></div>

<script>
const API = "http://localhost:8080/tasks";

// Fetch all tasks
async function loadTasks() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("tasks");
  container.innerHTML = "";

  data.forEach(t => {
    container.innerHTML += `
      <div class="bg-white p-3 mb-2 shadow">
        <b>${t.title}</b> - ${t.status}
        <button onclick="deleteTask(${t.id})" class="text-red-500 ml-2">Delete</button>
      </div>
    `;
  });
}

// Create task
async function createTask() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("desc").value;

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      description,
      status: "PENDING"
    })
  });

  loadTasks();
}

// Delete task
async function deleteTask(id) {
  await fetch(`${API}/${id}`, { method: "DELETE" });
  loadTasks();
}

// Load on start
loadTasks();
</script>

</body>
</html>
